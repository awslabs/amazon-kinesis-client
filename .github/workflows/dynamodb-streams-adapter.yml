name: DynamoDB Streams Kinesis Adapter Compatibility

on:
  pull_request:
    branches:
      - "master"

jobs:
  build-adapter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout KCL
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'corretto'

      - name: Install KCL to local Maven repo
        run: mvn -B install --file pom.xml -DskipTests -Dgpg.skip=true

      - name: Get KCL version from PR
        id: kcl-version
        run: echo "version=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> "$GITHUB_OUTPUT"

      - name: Checkout dynamodb-streams-kinesis-adapter
        uses: actions/checkout@v4
        with:
          repository: awslabs/dynamodb-streams-kinesis-adapter
          path: dynamodb-streams-kinesis-adapter

      - name: Build adapter against PR's KCL
        working-directory: dynamodb-streams-kinesis-adapter
        run: mvn -B package -Dgpg.skip=true -Dsoftware-kinesis.version=${{ steps.kcl-version.outputs.version }}
